services:
  - type: web
    name: pulse-llmops-backend
    env: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: APP_ENV
        value: production
      - key: DB_PATH
        value: /tmp/pulse.db
      - key: ALLOW_CORS_ORIGINS
        value: https://pulse-llmops.vercel.app
      - key: RATE_LIMIT_PER_MINUTE
        value: 120
      - key: GROQ_API_KEY
        sync: false
      - key: API_KEY
        sync: false
