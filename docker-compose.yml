version: "3.9"

services:
  backend:
    build:
      context: ./backend
    container_name: pulse-backend
    environment:
      - APP_ENV=production
      - DB_PATH=/data/pulse.db
      - ALLOW_CORS_ORIGINS=http://localhost:3000
      - GROQ_API_KEY=${GROQ_API_KEY}
      - API_KEY=${API_KEY}
      - RATE_LIMIT_PER_MINUTE=120
    volumes:
      - pulse_data:/data
    ports:
      - "8000:8000"

  frontend:
    build:
      context: ./frontend
    container_name: pulse-frontend
    environment:
      - REACT_APP_API_URL=http://localhost:8000
      - REACT_APP_WS_URL=ws://localhost:8000/ws
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  pulse_data:
